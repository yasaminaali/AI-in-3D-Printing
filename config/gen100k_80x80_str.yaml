# 100K Dataset Generation: 80x80 stripes
# 1250 seeds × 4 configs = 5,000 trajectories
machine_id: gen100k_80x80_str
num_workers: 64
output_dir: output/gen100k

assignments:
  - grid: [80, 80]
    patterns:
      - stripes
    sa_configs:
      - short
      - medium
      - long
      - extra_long
    seeds:
      stripes: 1250
