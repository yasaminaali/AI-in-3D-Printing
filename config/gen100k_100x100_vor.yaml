# 100K Dataset Generation: 100x100 voronoi
# 1250 seeds × 4 configs = 5,000 trajectories
machine_id: gen100k_100x100_vor
num_workers: 64
output_dir: output/gen100k

assignments:
  - grid: [100, 100]
    patterns:
      - voronoi
    sa_configs:
      - short
      - medium
      - long
      - extra_long
    seeds:
      voronoi: 1250
