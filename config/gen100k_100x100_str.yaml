# 100K Dataset Generation: 100x100 stripes
# 2500 seeds × 4 configs = 10,000 trajectories
machine_id: gen100k_100x100_str
num_workers: 64
output_dir: output/gen100k

assignments:
  - grid: [100, 100]
    patterns:
      - stripes
    sa_configs:
      - short
      - medium
      - long
      - extra_long
    seeds:
      stripes: 2500
