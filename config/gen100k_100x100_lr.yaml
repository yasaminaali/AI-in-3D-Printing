# 100K Dataset Generation: 100x100 left_right
# 1250 seeds × 4 configs = 5,000 trajectories
machine_id: gen100k_100x100_lr
num_workers: 64
output_dir: output/gen100k

assignments:
  - grid: [100, 100]
    patterns:
      - left_right
    sa_configs:
      - short
      - medium
      - long
      - extra_long
    seeds:
      left_right: 1250
