# 100K Dataset Generation: 60x60 grids, left_right + stripes
# 1250 seeds × 4 configs × 2 patterns = 10,000 trajectories
machine_id: gen100k_60x60_a
num_workers: 64
output_dir: output/gen100k

assignments:
  - grid: [60, 60]
    patterns:
      - left_right
      - stripes
    sa_configs:
      - short
      - medium
      - long
      - extra_long
    seeds:
      left_right: 1250
      stripes: 1250
